services:
  api-prod:
    container_name: bt-thp-aviste-backend-prod
    image: bt-thp-aviste-backend:1.0.0
    build:
      context: .
      dockerfile: ./Dockerfile
      target: production
    command: sh -c "npm run prisma:migrate && node dist/src/main.js"
    labels:
      - "traefik.enable=true"
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aviste-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: bt-thp-aviste-mysql
    restart: always
    command: --sql_mode="" --max_allowed_packet=32505856
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: visao_db
    ports:
      - "3307:3306"
    volumes:
      - db-volume:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aviste-network

  adminer:
    image: adminer
    container_name: bt-thp-aviste-adminer
    restart: always
    ports:
      - "8088:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aviste-network

networks:
  aviste-network:
    driver: bridge

volumes:
  db-volume:
    driver: local
